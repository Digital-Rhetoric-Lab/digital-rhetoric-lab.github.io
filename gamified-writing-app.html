<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WriteBack Quest — Offline Writing Practice</title>
  <style>
    :root{--bg1:#72e6c8;--bg2:#7c6cff;--ink:#1f2937;--muted:#667085;--card:#fffdf8;--line:#e7ddcc;--green:#29c66f;--green2:#0ea85a;--purple:#6d5dfc;--orange:#ffb020;--red:#ef4444;--blue:#2f80ed;--shadow:0 18px 40px rgba(31,41,55,.16);--r:24px}
    *{box-sizing:border-box} body{margin:0;color:var(--ink);font:16px/1.45 ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#d8fff2 0,#f7f2ff 36%,#fff8e8 100%);min-height:100vh} button,input,textarea,select{font:inherit} button{cursor:pointer}.app{display:grid;grid-template-columns:310px 1fr;min-height:100vh}.side{padding:20px;background:rgba(255,253,248,.78);border-right:1px solid var(--line);backdrop-filter:blur(14px);position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;align-items:center;gap:12px}.owl{width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,var(--green),#7df4b3);display:grid;place-items:center;box-shadow:var(--shadow);font-size:31px;animation:bob 2.6s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-5px)}}h1{font-size:24px;margin:0}.tag{font-size:13px;color:var(--muted);margin:2px 0 0}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:0 7px 18px rgba(31,41,55,.06)}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}.nav{display:grid;gap:9px}.nav button{border:0;background:transparent;text-align:left;padding:12px;border-radius:18px;font-weight:800;color:#344054;display:flex;justify-content:space-between;align-items:center}.nav button.active,.nav button:hover{background:#fff;box-shadow:0 8px 20px rgba(31,41,55,.08)}.nav .lock{opacity:.45}.main{padding:26px;max-width:1180px;width:100%;margin:0 auto}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.hero h2{font-size:38px;line-height:1;margin:0 0 6px}.hero p{margin:0;color:var(--muted)}.card{background:rgba(255,253,248,.92);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}.s7{grid-column:span 7}.s8{grid-column:span 8}.s12{grid-column:span 12}.btn{border:0;border-radius:18px;background:var(--green);color:#fff;padding:12px 16px;font-weight:900;box-shadow:0 6px 0 var(--green2);transition:.08s}.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--green2)}.btn.alt{background:#fff;color:#344054;border:1px solid var(--line);box-shadow:0 6px 0 #d9d0c1}.btn.purple{background:var(--purple);box-shadow:0 6px 0 #5143d0}.btn.orange{background:var(--orange);box-shadow:0 6px 0 #d88900}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.stack{display:grid;gap:12px}.pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 11px;font-size:13px;font-weight:800}.xpbar{height:18px;background:#ede5d8;border-radius:999px;overflow:hidden;border:1px solid var(--line)}.xpbar div{height:100%;background:linear-gradient(90deg,var(--green),#58e6a1);width:0%;transition:.5s}.path{display:grid;gap:18px;max-width:720px;margin:auto}.node{display:flex;align-items:center;gap:14px}.bubble{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;font-size:30px;background:#fff;border:5px solid #d8d0c3;box-shadow:0 10px 0 #d8d0c3;position:relative}.bubble.done{background:#dffbea;border-color:var(--green);box-shadow:0 10px 0 var(--green2)}.bubble.current{background:#eeeaff;border-color:var(--purple);box-shadow:0 10px 0 #5143d0;animation:pulse 1.6s infinite}@keyframes pulse{50%{transform:scale(1.04)}}.node:nth-child(even){margin-left:115px}.lessonCard{max-width:820px;margin:auto}.choice{width:100%;border:2px solid var(--line);background:#fff;text-align:left;border-radius:20px;padding:14px;font-weight:800}.choice:hover{border-color:var(--green);transform:translateY(-1px)}.choice.correct{background:#dcfce7;border-color:var(--green)}.choice.wrong{background:#fee2e2;border-color:var(--red)}textarea,input,select{width:100%;border:2px solid var(--line);border-radius:20px;background:#fff;padding:13px;color:var(--ink)}textarea{min-height:130px;resize:vertical}.small{font-size:13px;color:var(--muted)}.toast{position:fixed;right:22px;bottom:22px;background:#1f2937;color:#fff;padding:14px 16px;border-radius:18px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.25s;z-index:9}.toast.show{opacity:1;transform:translateY(0)}.modal{position:fixed;inset:0;background:rgba(31,41,55,.42);display:none;align-items:center;justify-content:center;padding:20px;z-index:8}.modal.show{display:flex}.modal .card{max-width:470px;text-align:center}.big{font-size:58px}.badge{display:inline-block;background:#eefbf3;color:#087443;border:1px solid #b8efcf;border-radius:16px;padding:8px 10px;font-weight:900;margin:4px}.sample{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.timer{font-size:56px;font-weight:1000;letter-spacing:-2px}.confetti{position:fixed;top:-10px;width:9px;height:14px;border-radius:3px;animation:fall 900ms linear forwards;z-index:20}@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.4}}.wordbank button{margin:4px}.sentence{min-height:54px;background:#fff;border:2px dashed var(--line);border-radius:18px;padding:10px}.danger{color:var(--red);font-weight:900}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.hero{display:block}.s3,.s4,.s5,.s6,.s7,.s8{grid-column:span 12}.node:nth-child(even){margin-left:0}.hero h2{font-size:30px}}
  </style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><div class="owl">🦉</div><div><h1>WriteBack Quest</h1><p class="tag">Tiny writing wins, every day</p></div></div><div class="stats"><div class="stat"><b id="xp">0</b><span>XP</span></div><div class="stat"><b id="streak">0🔥</b><span>day streak</span></div><div class="stat"><b id="hearts">5❤️</b><span>hearts</span></div><div class="stat"><b id="level">1</b><span>level</span></div></div><div class="xpbar"><div id="xpbar"></div></div><p class="small" id="xptext">0 / 100 XP to next level</p><nav class="nav" id="nav"></nav><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><button class="btn alt" onclick="exportData()">Export portfolio</button> <button class="btn alt" onclick="resetAll()">Reset</button></aside><main class="main"><div class="hero"><div><h2 id="title"></h2><p id="sub"></p></div><div class="row"><span class="pill" id="profile">🧭 No profile</span><span class="pill" id="dailyGoal">🎯 Daily goal: 20 XP</span></div></div><section id="content"></section></main></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="card"><div class="big" id="modalIcon">🎉</div><h2 id="modalTitle">Nice!</h2><p id="modalText"></p><button class="btn" onclick="closeModal()">Continue</button></div></div>
<script>
const $=s=>document.querySelector(s), day=()=>new Date().toISOString().slice(0,10), rnd=a=>a[Math.floor(Math.random()*a.length)];
const S=JSON.parse(localStorage.wbq||'{}'); Object.assign(S,{xp:S.xp||0,hearts:S.hearts??5,streak:S.streak||0,lastDay:S.lastDay||'',profile:S.profile||null,done:S.done||{},draft:S.draft||{},practice:S.practice||[],portfolio:S.portfolio||[],badges:S.badges||[],dailyXp:S.dailyXp||{},wordWins:S.wordWins||0});
const lessons=[
{id:'claim',emoji:'🎯',title:'Claims are arguable',mini:'A claim takes a position. A topic just points at a subject.',q:'Which is the strongest thesis?',choices:['Social media is popular.','Social media has both good and bad effects.','Schools should teach social media literacy because online habits shape attention, evidence use, and civic life.'],ans:2,write:'Write one arguable claim about a class, hobby, film, game, or issue.'},
{id:'para',emoji:'🧱',title:'Paragraphs need one main job',mini:'A paragraph should make one point, support it, and explain the support.',q:'What does a topic sentence do?',choices:['Introduces the paragraph’s main point.','Lists every source used.','Ends the essay dramatically.'],ans:0,write:'Write a topic sentence that clearly previews one paragraph.'},
{id:'evidence',emoji:'🔍',title:'Evidence needs explaining',mini:'Readers need you to connect evidence back to your claim.',q:'Best phrase for analysis?',choices:['This quote is good.','This matters because...','In conclusion, evidence.'],ans:1,write:'Finish this: This evidence matters because...'},
{id:'revision',emoji:'🔁',title:'Revision is re-thinking',mini:'Revision is not just grammar. It changes ideas, order, evidence, and clarity.',q:'Which is a deep revision?',choices:['Changing a comma.','Adding a stronger counterpoint and reorganizing body paragraphs.','Making the font bigger.'],ans:1,write:'Name one deep revision you could make to a draft.'},
{id:'tone',emoji:'🎙️',title:'Academic tone is clear, not fancy',mini:'Good academic style is precise and readable.',q:'Which sentence is clearest?',choices:['The thing was very impactful to lots of stuff.','The policy changed how students planned homework.','It is indubitably situated in a multiplicity of stuff.'],ans:1,write:'Rewrite a vague sentence so it sounds clearer.'}
];
const pages={quest:['Quest Path','Complete bite-sized writing levels.',quest],lesson:['Lesson Arena','Answer, write, and earn XP.',lesson],sprint:['Writing Sprint','Timed practice with playful prompts.',sprint],builder:['Essay Builder','Turn scattered thoughts into a draft.',builder],duel:['Revision Duel','Battle weak sentences and level them up.',duel],feedback:['Coach Check','Offline feedback with revision missions.',feedback],shop:['Badge Shop','Spend XP on goofy writing titles.',shop],portfolio:['Portfolio','Save drafts and reflections.'],};
let current=location.hash.replace('#','')||'quest'; if(!pages[current])current='quest'; let activeLesson=lessons.find(x=>!S.done[x.id])?.id||lessons[0].id;
function save(){localStorage.wbq=JSON.stringify(S); shell()} function toast(t){let e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1600)}
function award(xp,msg){S.xp+=xp;S.dailyXp[day()]=(S.dailyXp[day()]||0)+xp;if(S.lastDay!==day()){S.streak=S.lastDay?S.streak+1:1;S.lastDay=day()} save(); confetti(); openModal('🎉',`+${xp} XP`,msg||'Writing move unlocked!')}
function loseHeart(){S.hearts=Math.max(0,S.hearts-1); save(); if(S.hearts===0)openModal('💔','Out of hearts','Take a tiny practice break. Hearts refilled!'),S.hearts=5,save();}
function shell(){let lvl=Math.floor(S.xp/100)+1, inLvl=S.xp%100;$('#xp').textContent=S.xp;$('#level').textContent=lvl;$('#hearts').textContent=S.hearts+'❤️';$('#streak').textContent=S.streak+'🔥';$('#xpbar').style.width=inLvl+'%';$('#xptext').textContent=`${inLvl} / 100 XP to next level`;$('#profile').textContent=S.profile?'🧭 '+S.profile:'🧭 No profile';$('#dailyGoal').textContent=`🎯 Daily goal: ${Math.min(20,S.dailyXp[day()]||0)}/20 XP`;$('#nav').innerHTML=Object.keys(pages).map(k=>`<button class="${k===current?'active':''}" onclick="go('${k}')"><span>${navName(k)}</span><span>${navIcon(k)}</span></button>`).join('')}
function navName(k){return {quest:'Quest Path',lesson:'Lesson Arena',sprint:'Writing Sprint',builder:'Essay Builder',duel:'Revision Duel',feedback:'Coach Check',shop:'Badge Shop',portfolio:'Portfolio'}[k]} function navIcon(k){return {quest:'🗺️',lesson:'⭐',sprint:'⏱️',builder:'🧩',duel:'⚔️',feedback:'✅',shop:'🏅',portfolio:'📚'}[k]}
function go(k){current=k;location.hash=k;render()} window.onhashchange=()=>{current=location.hash.replace('#','')||'quest';render()}
function render(){shell();$('#title').textContent=pages[current][0];$('#sub').textContent=pages[current][1];$('#content').innerHTML=(pages[current][2]||portfolio)()}
function quest(){return `<div class="grid"><div class="card s8"><div class="path">${lessons.map((l,i)=>`<div class="node"><button class="bubble ${S.done[l.id]?'done':l.id===activeLesson?'current':''}" onclick="activeLesson='${l.id}';go('lesson')">${S.done[l.id]?'✓':l.emoji}</button><div><h3>${l.title}</h3><p class="small">${S.done[l.id]?'Mastered':l.id===activeLesson?'Current quest':'Tap to practice'}</p></div></div>`).join('')}</div></div><div class="card s4 stack"><h3>Today’s challenge</h3><p>Earn 20 XP by completing a lesson, sprint, or revision duel.</p><button class="btn" onclick="go('lesson')">Start lesson</button><button class="btn purple" onclick="go('sprint')">Do sprint</button><h3>Badges</h3><div>${badges()}</div></div></div>`}
function lesson(){let l=lessons.find(x=>x.id===activeLesson)||lessons[0];return `<div class="lessonCard card stack"><div class="row"><span class="big">${l.emoji}</span><div><h2>${l.title}</h2><p>${l.mini}</p></div></div><h3>${l.q}</h3><div class="stack" id="choices">${l.choices.map((c,i)=>`<button class="choice" onclick="checkChoice(this,${i},${l.ans})">${c}</button>`).join('')}</div><label><b>Writing move</b>: ${l.write}</label><textarea id="lessonWrite">${S.done[l.id]||''}</textarea><button class="btn" onclick="finishLesson('${l.id}')">Check & complete</button></div>`}
function checkChoice(btn,i,ans){document.querySelectorAll('.choice').forEach(b=>b.disabled=true); if(i===ans){btn.classList.add('correct');toast('Correct!')}else{btn.classList.add('wrong');document.querySelectorAll('.choice')[ans].classList.add('correct');loseHeart();toast('Not quite — review the green answer.')}}
function finishLesson(id){let v=$('#lessonWrite').value.trim();if(v.split(/\s+/).length<6)return toast('Write at least 6 words.');let first=!S.done[id];S.done[id]=v;if(first){S.badges.push(lessons.find(l=>l.id===id).title);award(15,'Lesson complete!')}else toast('Updated your response.');save();activeLesson=lessons.find(x=>!S.done[x.id])?.id||id;render()}
let timer=null, secs=180; const sprintPrompts=['Make a claim about something ordinary.','Explain why a piece of evidence matters.','Write a paragraph using: claim, evidence, analysis.','Describe your writing process honestly.','Turn a vague idea into a precise sentence.'];
function sprint(){return `<div class="grid"><div class="card s7 stack"><h3>3-minute sprint</h3><p class="quote">${rnd(sprintPrompts)}</p><div class="timer" id="timer">03:00</div><div class="row"><button class="btn" onclick="startSprint()">Start</button><button class="btn alt" onclick="clearInterval(timer)">Pause</button></div><textarea id="sprintText" placeholder="Keep writing. Don’t edit yet."></textarea><button class="btn purple" onclick="saveSprint()">Bank my XP</button></div><div class="card s5"><h3>Combo bonuses</h3><p>30+ words: +10 XP<br>60+ words: +15 XP<br>Uses “because”: +5 XP</p><p class="small">Sprints build fluency through low-stakes repetition.</p></div></div>`}
function startSprint(){clearInterval(timer);secs=180;timer=setInterval(()=>{secs=Math.max(0,secs-1);$('#timer').textContent=String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');if(!secs)clearInterval(timer)},1000)}
function saveSprint(){let t=$('#sprintText').value.trim(), w=t.split(/\s+/).filter(Boolean).length;if(w<10)return toast('Write at least 10 words.');let xp=w>=60?15:w>=30?10:5;if(/because/i.test(t))xp+=5;S.practice.push({date:day(),text:t,words:w});award(xp,`Sprint saved: ${w} words.`);render()}
function builder(){let steps=['Question','Working thesis','Reason 1','Evidence','Analysis','Counterpoint','Conclusion'];return `<div class="grid"><div class="card s8 stack">${steps.map(s=>`<label><b>${s}</b></label><textarea oninput="S.draft['${s}']=this.value;save()">${S.draft[s]||''}</textarea>`).join('')}<button class="btn" onclick="snapshot()">Save draft snapshot +20 XP</button></div><div class="card s4"><h3>Essay creature</h3><div class="big">${Object.values(S.draft).filter(Boolean).length<3?'🥚':Object.values(S.draft).filter(Boolean).length<6?'🐣':'🦉'}</div><p>${Object.values(S.draft).filter(Boolean).length}/7 parts completed</p><div class="xpbar"><div style="width:${Object.values(S.draft).filter(Boolean).length/7*100}%"></div></div></div></div>`}
function snapshot(){if(Object.values(S.draft).filter(Boolean).length<3)return toast('Complete at least 3 draft parts.');S.portfolio.push({date:day(),draft:{...S.draft},reflection:''});award(20,'Draft snapshot added to portfolio.');go('portfolio')}
const weak=['This quote is good because it shows stuff.','There are many reasons why phones are bad.','The author uses things to make the reader feel things.'];
function duel(){return `<div class="card stack lessonCard"><h3>Revision Duel ⚔️</h3><p>Defeat the weak sentence by making it more precise.</p><div class="sample" id="weak">${rnd(weak)}</div><textarea id="revise" placeholder="Rewrite it stronger..."></textarea><button class="btn orange" onclick="winDuel()">Strike!</button></div>`}
function winDuel(){let t=$('#revise').value.trim();if(t.split(/\s+/).length<8)return toast('Make the revision more developed.');if(/stuff|things|good|bad/i.test(t)){loseHeart();return toast('Too vague — remove words like stuff/things/good/bad.')}S.wordWins++;award(12,'You defeated a vague sentence!');render()}
function feedback(){return `<div class="grid"><div class="card s6 stack"><p class="small">Offline rule-based coach. Your writing stays in this browser.</p><textarea id="fb" placeholder="Paste a paragraph..."></textarea><button class="btn" onclick="analyze()">Get missions</button></div><div class="card s6"><h3>Revision missions</h3><div id="out" class="stack"><p class="small">Missions appear here.</p></div></div></div>`}
function analyze(){let t=$('#fb').value.trim(),w=t.split(/\s+/).filter(Boolean).length,tips=[];if(w<80)tips.push('Add one concrete example or quotation.');if(!/because|therefore|this shows|this matters|as a result/i.test(t))tips.push('Add a sentence explaining why the evidence matters.');if(/stuff|things|very|really/i.test(t))tips.push('Replace vague intensifiers or vague nouns with precise words.');if(!/[.!?]$/.test(t))tips.push('Finish the paragraph with clear punctuation.');if(!tips.length)tips.push('Strong base: now improve transitions and sentence variety.');$('#out').innerHTML=tips.map((x,i)=>`<button class="choice" onclick="this.classList.add('correct');award(3,'Mission checked off!')">Mission ${i+1}: ${x}</button>`).join('')}
const titles=['Comma Comet','Thesis Goblin','Paragraph Paladin','Evidence Wizard','Revision Ranger','Clarity Captain'];
function shop(){return `<div class="grid">${titles.map(t=>`<div class="card s4 stack"><h3>${t}</h3><p class="small">Cosmetic title — costs 25 XP.</p><button class="btn purple" onclick="buy('${t}')">Buy</button></div>`).join('')}</div>`}
function buy(t){if(S.xp<25)return toast('Need 25 XP.');S.xp-=25;S.profile=t;S.badges.push(t);save();toast('Title equipped: '+t)}
function portfolio(){return `<div class="grid"><div class="card s12"><h3>Your writing portfolio</h3>${S.portfolio.map((p,i)=>`<div class="card" style="box-shadow:none;margin:12px 0"><b>${p.date}</b><div class="sample">${Object.entries(p.draft).filter(([k,v])=>v).map(([k,v])=>k+': '+v).join('\n\n')}</div><label>Revision reflection</label><textarea onchange="S.portfolio[${i}].reflection=this.value;save()">${p.reflection||''}</textarea></div>`).join('')||'<p class="small">No snapshots yet. Build an essay and save one.</p>'}</div></div>`}
function badges(){let b=[...new Set(S.badges)]; if(S.wordWins>=3)b.push('Vagueness Slayer'); if(S.practice.length>=3)b.push('Sprint Streaker'); return b.map(x=>`<span class="badge">${x}</span>`).join('')||'<p class="small">Earn badges by completing quests.</p>'}
function openModal(i,t,m){$('#modalIcon').textContent=i;$('#modalTitle').textContent=t;$('#modalText').textContent=m;$('#modal').classList.add('show')} function closeModal(){$('#modal').classList.remove('show')} function confetti(){for(let i=0;i<26;i++){let d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'vw';d.style.background=rnd(['#29c66f','#6d5dfc','#ffb020','#2f80ed','#ef4444']);d.style.animationDelay=Math.random()*250+'ms';document.body.appendChild(d);setTimeout(()=>d.remove(),1200)}}
function exportData(){let blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='writeback-quest-portfolio.json';a.click();URL.revokeObjectURL(a.href)}
function resetAll(){if(confirm('Reset all local data?')){localStorage.removeItem('wbq');location.reload()}}
render();
</script>
</body>
</html>
