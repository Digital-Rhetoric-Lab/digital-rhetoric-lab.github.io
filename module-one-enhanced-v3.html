<script>
(()=>{const KEY='dln.builder.clearer.v11.placeholder.persist'; const PROF=new URLSearchParams(location.search).get('prof')==='true';
const LITS=[['rhetorical','🗣️','Rhetorical literacy','Definition placeholder for rhetorical literacy.','Example placeholder for rhetorical literacy.'],['cognitive','🧠','Cognitive literacy','Definition placeholder for cognitive literacy.','Example placeholder for cognitive literacy.'],['critical','⚖️','Critical literacy','Definition placeholder for critical literacy.','Example placeholder for critical literacy.'],['functional','⚙️','Functional literacy','Definition placeholder for functional literacy.','Example placeholder for functional literacy.']];
const SORT=[['rhetorical','Sorting example placeholder for rhetorical literacy.'],['cognitive','Sorting example placeholder for cognitive literacy.'],['critical','Sorting example placeholder for critical literacy.'],['functional','Sorting example placeholder for functional literacy.']];
const REVIEW=['Checklist placeholder: introduction.','Checklist placeholder: moment paragraphs.','Checklist placeholder: evidence and details.','Checklist placeholder: dimensions.','Checklist placeholder: transitions.','Checklist placeholder: conclusion.','Checklist placeholder: editing and polish.'];
const GROUPS=[['learn','Learn'],['brain','Brainstorm'],['draft','Draft'],['review','Review & export']];
const FIELDS=[['topic','Topic sentence placeholder'],['where','Where placeholder'],['when','When placeholder'],['who','Who/audience placeholder'],['what','What you were trying to do placeholder'],['how','How you responded placeholder'],['why','Why it mattered placeholder'],['evidence','Evidence/details placeholder']];
const FAST_FIELDS=['topic','what','why','evidence'];
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])), wc=t=>String(t||'').trim().split(/\s+/).filter(Boolean).length, clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const fresh=()=>({screen:-1,mode:'full',sort:{},sortChecked:false,ui:{examples:{},drawers:{},selectedGroup:'learn'},moments:[1,2,3].map(()=>({fields:{},lits:[],paragraph:''})),draftPlans:{intro:{hook:'',thesis:'',map:''},moments:[1,2,3].map(()=>({topic:'',transition:'',evidence:'',meaning:''})),conclusion:{takeaway:'',growth:'',closing:''}},locks:{},intro:'',conclusion:'',essayDraft:'',review:{notes:'',checks:{}},essayDraftDirty:false,profEdits:{},profEditLog:[],profEditMode:false,profHiddenPages:{},skip:{},analytics:{startedAt:new Date().toISOString(),lastPageId:null,lastPageAt:Date.now(),pageTimeMs:{},pageVisits:{},clicks:{},buttonClicks:[],downloads:[]}});
function merge(a,b){if(Array.isArray(a))return a.map((x,i)=>merge(x,b&&b[i]));if(a&&typeof a==='object'){let o={...a};Object.keys(b||{}).forEach(k=>o[k]=merge(a[k],b[k]));return o}return b!==undefined?b:a}let st;try{st=merge(fresh(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch{st=fresh()}

function ensureAnalytics(){
  if(!st.analytics)st.analytics={};
  let a=st.analytics;
  if(!a.startedAt)a.startedAt=new Date().toISOString();
  if(!a.pageTimeMs)a.pageTimeMs={};
  if(!a.pageVisits)a.pageVisits={};
  if(!a.clicks)a.clicks={};
  if(!Array.isArray(a.buttonClicks))a.buttonClicks=[];
  if(!Array.isArray(a.downloads))a.downloads=[];
  if(!a.lastPageAt)a.lastPageAt=Date.now();
  return a;
}
function pageIdNow(){let ss=screens();return st.screen<0?'overview':(ss[st.screen]?ss[st.screen].id:'unknown')}
function trackPageTransition(){let a=ensureAnalytics(),now=Date.now(),pid=pageIdNow();if(a.lastPageId&&a.lastPageId!==pid){let dt=Math.max(0,now-(a.lastPageAt||now));a.pageTimeMs[a.lastPageId]=(a.pageTimeMs[a.lastPageId]||0)+dt}if(a.lastPageId!==pid){a.lastPageId=pid;a.lastPageAt=now;a.pageVisits[pid]=(a.pageVisits[pid]||0)+1}}
function flushPageTime(){let a=ensureAnalytics(),now=Date.now();if(a.lastPageId){let dt=Math.max(0,now-(a.lastPageAt||now));a.pageTimeMs[a.lastPageId]=(a.pageTimeMs[a.lastPageId]||0)+dt;a.lastPageAt=now}}
function trackClick(btnEl){try{let a=ensureAnalytics(),key=btnEl.dataset.a||'unknown',label=String(btnEl.textContent||'').trim().replace(/\s+/g,' ').slice(0,120),page=pageIdNow();a.clicks[key]=(a.clicks[key]||0)+1;a.buttonClicks.push({at:new Date().toISOString(),page,action:key,label});if(a.buttonClicks.length>2000)a.buttonClicks=a.buttonClicks.slice(-2000)}catch(e){}}
function b64EncodeUnicode(str){let bytes=new TextEncoder().encode(str),bin='';bytes.forEach(b=>bin+=String.fromCharCode(b));return btoa(bin)}
function textStatsSnapshot(){let boxes=[];function add(path,label,value,optional){boxes.push({path,label,words:wc(value),characters:String(value||'').length,used:!!String(value||'').trim(),optional:!!optional})}
  add('intro','Introduction',st.intro,false);st.moments.forEach((m,i)=>{Object.keys(m.fields||{}).forEach(k=>add(`moments.${i}.fields.${k}`,`Moment ${i+1} ${k}`,m.fields[k],false));add(`moments.${i}.paragraph`,`Moment ${i+1} paragraph`,m.paragraph,false)});
  Object.keys(st.draftPlans?.intro||{}).forEach(k=>add(`draftPlans.intro.${k}`,`Intro plan ${k}`,st.draftPlans.intro[k],false));(st.draftPlans?.moments||[]).forEach((p,i)=>Object.keys(p||{}).forEach(k=>add(`draftPlans.moments.${i}.${k}`,`Moment ${i+1} plan ${k}`,p[k],false)));
  Object.keys(st.draftPlans?.conclusion||{}).forEach(k=>add(`draftPlans.conclusion.${k}`,`Conclusion plan ${k}`,st.draftPlans.conclusion[k],false));add('conclusion','Conclusion',st.conclusion,false);add('essayDraft','Complete draft editor',st.essayDraft,false);add('review.notes','Review notes',st.review?.notes,true);
  Object.keys(st.ui?.drawers||{}).forEach(k=>boxes.push({path:`ui.drawers.${k}`,label:`Optional drawer: ${k}`,used:!!st.ui.drawers[k],optional:true,type:'drawer'}));Object.keys(st.ui?.examples||{}).forEach(k=>boxes.push({path:`ui.examples.${k}`,label:`Optional example: ${k}`,used:!!st.ui.examples[k],optional:true,type:'example'}));
  return boxes;
}
function studentExportPayload(){flushPageTime();let ss=screens(),pr=progress();return {format:'DLN_PROFESSOR_DATA_V1',appTitle:'Digital Literacy Narrative Builder',exportedAt:new Date().toISOString(),student:{displayName:'',localId:'',userAgent:navigator.userAgent},progress:pr,mode:st.mode,screen:st.screen,screenList:ss.map((s,i)=>({index:i,id:s.id,group:s.group,title:s.t,kind:s.kind,complete:complete(s),skipped:isSkipped(s),hidden:!!(st.profHiddenPages&&st.profHiddenPages[s.id])})),state:st,essay:finalEssay(),wordStats:textStatsSnapshot(),analytics:st.analytics};}

function reqMoment(){return st.mode==='quick'?3:5}function reqIntro(){return st.mode==='quick'?20:40}function reqPara(){return st.mode==='quick'?55:90}function reqConclusion(){return st.mode==='quick'?20:35}
function screens(){let list=[
{id:'learn-dimensions',group:'learn',t:'Learn the four dimensions',kind:'Read',do:['Read the four cards.','Open any optional placeholder example if helpful.'],r:dimensions,c:()=>PROF||st.mode==='quick'||Object.keys(st.ui.examples).length>=1},
{id:'learn-sort',group:'learn',t:'Sort the examples',kind:'Practice',do:['Choose a dimension for each placeholder example.','Check your sorting.'],r:sortPage,c:()=>PROF||(st.sortChecked&&SORT.every((x,i)=>st.sort[i]===x[0]))},
...[0,1,2].map(i=>({id:'brain-'+(i+1),group:'brain',t:`Moment ${i+1} brainstorm`,kind:'Brainstorm',do:['Use this one page to collect notes for this moment.','Add enough details to unlock the next page.'],r:()=>momentPage(i),c:()=>PROF||doneMoment(i)>=reqMoment()})),
{id:'plan-intro',group:'draft',t:'Plan the introduction',kind:'Plan',do:['Write the thesis/main point for your narrative.','Add the opening idea and roadmap that will be copied into your draft.'],r:()=>draftPlanPage('intro'),c:()=>PROF||doneDraftPlan('intro')},
{id:'intro',group:'draft',t:'Introduction',kind:'Draft',do:['Use your locked plan as a starting point.','Revise and expand the paragraph in your own words.'],r:introPage,c:()=>PROF||wc(st.intro)>=reqIntro()},
...[0,1,2].flatMap(i=>[
{id:'plan-para-'+(i+1),group:'draft',t:`Plan Moment ${i+1} paragraph`,kind:'Plan',do:['Write a topic sentence and choose the details this paragraph will use.','When you advance, this plan is copied into the draft and then locked.'],r:()=>draftPlanPage('moment',i),c:()=>PROF||doneDraftPlan('moment',i)},
{id:'para-'+(i+1),group:'draft',t:`Moment ${i+1} paragraph`,kind:'Draft',do:['Review the locked plan and brainstorm notes.','Revise, expand, and polish this moment paragraph.'],r:()=>paraPage(i),c:()=>PROF||wc(st.moments[i].paragraph)>=reqPara()}
]),
{id:'plan-conclusion',group:'draft',t:'Plan the conclusion',kind:'Plan',do:['Write the takeaway you want readers to remember.','Add the growth/reflection idea that will be copied into your draft.'],r:()=>draftPlanPage('conclusion'),c:()=>PROF||doneDraftPlan('conclusion')},
{id:'conclusion',group:'draft',t:'Conclusion',kind:'Draft',do:['Use your locked plan as a starting point.','Revise and expand your conclusion.'],r:conclusionPage,c:()=>PROF||wc(st.conclusion)>=reqConclusion()},
{id:'review',group:'review',t:'Review and export',kind:'Finish',do:['Complete the checklist.','Download or copy your work.'],r:reviewPage,c:()=>PROF||(Object.values(st.review.checks).filter(Boolean).length>=5&&userDraftWords()>0)}];return PROF?list:list.filter(s=>!(st.profHiddenPages&&st.profHiddenPages[s.id]))}
function save(){try{localStorage.setItem(KEY,JSON.stringify(st))}catch(e){console.warn('Autosave failed',e);try{toast('Autosave is unavailable in this browser.')}catch(_){}}}function complete(s){return PROF||s.c()}function isSkipped(s){return !complete(s)&&!!st.skip[s.id]}function ready(s){return complete(s)||isSkipped(s)}function progress(){let ss=screens(),d=ss.filter(complete).length,sk=ss.filter(isSkipped).length;return{d,sk,t:ss.length,p:Math.round(d/ss.length*100)}}function can(i){if(PROF||i<=st.screen)return true;let ss=screens();for(let k=0;k<i;k++)if(!ready(ss[k]))return false;return true}function groupDone(g){return screens().filter(s=>s.group===g).every(complete)}function currentGroup(){let ss=screens();return st.screen<0?'overview':ss[st.screen].group}function groupFirst(g){return screens().findIndex(s=>s.group===g)}function btn(a,l,c='btn secondary small',x=''){return `<button class="${c}" data-a="${a}" ${x}>${l}</button>`}function tag(id){let l=LITS.find(x=>x[0]===id);return l?`<span class="tag ${id}">${l[1]} ${l[2]}</span>`:''}function fillTemplate(tpl,vars={}){return String(tpl??'').replace(/\[([a-zA-Z0-9_-]+)\]/g,(m,k)=>vars[k]!==undefined?vars[k]:m)}function ptxt(key,fallback,vars={}){let tpl=(st.profEdits&&st.profEdits[key]!==undefined)?st.profEdits[key]:fallback;return esc(fillTemplate(tpl,vars))}function pspan(key,fallback,vars={}){let tpl=(st.profEdits&&st.profEdits[key]!==undefined)?st.profEdits[key]:fallback;return `<span data-prof-key="${esc(key)}" data-prof-template="${esc(fallback)}">${ptxt(key,tpl,vars)}</span>`}

function draftPlanPage(type,i){let locked=planLocked(type,i),p=planData(type,i),dis=locked?'disabled':'';let title=type==='intro'?'Introduction plan':type==='conclusion'?'Conclusion plan':`Moment ${i+1} paragraph plan`;let lockedMsg=locked?`<div class="readyBox good">This plan is locked because it has already been copied into the writing page. Edit the paragraph on the writing page instead.</div>`:`<div class="readyBox">Complete the plan, then click Next. Your ideas will be copied into the draft one time.</div>`;let fields='';if(type==='intro'){fields=`<label class="label">Opening idea / hook</label><textarea data-bind="draftPlans.intro.hook" ${dis}>${esc(p.hook||'')}</textarea><label class="label">Thesis / main point</label><textarea data-bind="draftPlans.intro.thesis" ${dis}>${esc(p.thesis||'')}</textarea><label class="label">Roadmap / moments preview</label><textarea data-bind="draftPlans.intro.map" ${dis}>${esc(p.map||'')}</textarea>`}else if(type==='conclusion'){fields=`<label class="label">Takeaway / final claim</label><textarea data-bind="draftPlans.conclusion.takeaway" ${dis}>${esc(p.takeaway||'')}</textarea><label class="label">Growth or reflection</label><textarea data-bind="draftPlans.conclusion.growth" ${dis}>${esc(p.growth||'')}</textarea><label class="label">Closing sentence idea</label><textarea data-bind="draftPlans.conclusion.closing" ${dis}>${esc(p.closing||'')}</textarea>`}else{fields=`<label class="label">Topic sentence</label><textarea data-bind="draftPlans.moments.${i}.topic" ${dis}>${esc(p.topic||'')}</textarea><label class="label">Transition / context</label><textarea data-bind="draftPlans.moments.${i}.transition" ${dis}>${esc(p.transition||'')}</textarea><label class="label">Key evidence to include</label><textarea data-bind="draftPlans.moments.${i}.evidence" ${dis}>${esc(p.evidence||'')}</textarea><label class="label">Meaning / analysis</label><textarea data-bind="draftPlans.moments.${i}.meaning" ${dis}>${esc(p.meaning||'')}</textarea>`}ret function bind(){let app=$('#app');app.onclick=e=>{let b=e.target.closest('[data-a]');if(PROF&&b&&b.dataset.a==='toggleProfEdit'){st.profEditMode=!st.profEditMode;if(!st.profEditMode)downloadEditedHtml();render();return}if(PROF&&b&&b.dataset.a==='resetProfEdits'){if(prompt('Type RESET to remove instructor edits from this browser.')==='RESET'){st.profEdits={};st.profEditLog=[];save();render();toast('Instructor edits reset.')}return}if(PROF&&st.profEditMode){let editEl=profEditTarget(e);if(editEl){editText(editEl);return}return}if(!b||b.disabled||b.dataset.profDisabled==='true')return;trackClick(b);let a=b.dataset.a,ss=screens();if(a==='mode')st.mode=b.dataset.mode;else if(a==='overview')st.screen=-1;else if(a==='continue'){let i=ss.findIndex(s=>!ready(s));st.screen=i<0?ss.length-1:i}else if(a==='group'){st.ui.selectedGroup=b.dataset.group;let i=groupFirst(b.dataset.group);if(i>=0&&can(i))st.screen=i;else toast('Finish earlier pages first.')}else if(a==='goto'){let i=+b.dataset.i;if(can(i)){if(i>st.screen)finalizeDraftPlan(ss[st.screen]);st.screen=i;st.ui.selectedGroup=ss[i].group}else toast('Finish earlier pages first.')}else if(a==='back')st.screen=st.screen<=0?-1:st.screen-1;else if(a==='next'){finalizeDraftPlan(ss[st.screen]);st.screen=Math.min(ss.length-1,st.screen+1)}else if(a==='skip'){st.skip[ss[st.screen].id]=true;st.screen=Math.min(ss.length-1,st.screen+1)}else if(a==='download')download('essay');else if(a==='profdata')download('profdata');else if(a==='packet')download('packet');else if(a==='submit')download('backup');else if(a==='restore')restoreBackup();else if(a==='copy')copy(finalEssay());else if(a==='clear')clear();else if(a==='downloadEdited')downloadEditedHtml();else if(PROF&&a==='togglePageHidden'){let s=screens()[st.screen];if(s){if(!st.profHiddenPages)st.profHiddenPages={};st.profHiddenPages[s.id]=!st.profHiddenPages[s.id];save();toast(st.profHiddenPages[s.id]?'Page hidden from students.':'Page visible to students.')}}else if(a==='toggleEx')st.ui.ex function doneMoment(i){let m=st.moments[i],f=m.fields,count=0;if(m.lits.length)count++;let keys=st.mode==='quick'?FAST_FIELDS:FIELDS.map(x=>x[0]);keys.forEach(k=>{if(String(f[k]||'').trim())count++});return count}function readyMessage(i){let n=doneMoment(i),need=Math.max(0,reqMoment()-n),key=need===0?'ready-notes-good':'ready-notes-needed',fallback=need===0?'You have enough notes to draft this paragraph.':'Add [notes-left] more [note-word] before moving on.';return `<div class="readyBox ${need===0?'good':''}">${pspan(key,fallback,{'notes-left':need,'note-word':need===1?'note':'notes'})}</div>`}
function momentText(i){let m=st.moments[i],f=m.fields;return `Topic sentence: ${f.topic||'[topic sentence]'}\nDimensions: ${m.lits.map(id=>(LITS.find(l=>l[0]===id)||[])[2]).filter(Boolean).join(', ')||'[associated dimensions]'}\nWhere: ${f.where||'[where]'}\nWhen: ${f.when||'[when]'}\nWho: ${f.who||'[who/audience]'}\nWhat: ${f.what||'[what you were trying to do]'}\nHow: ${f.how||'[how you responded]'}\nWhy it matters: ${f.why||'[why it mattered]'}\nEvidence: ${f.evidence||'[specific details that show, not just tell]'}`}
function fullDraft(){return `${st.intro||'[Introduction paragraph]'}\n\n${st.moments.map((m,i)=>m.paragraph||`[Moment ${i+1} paragraph]`).join('\n\n')}\n\n${st.conclusion||'[Conclusion paragraph]'}`}
function quality(t,target){let n=wc(t),topic=/^\s*\S+/.test(t),evidence=/\b(screen|message|source|caption|email|comment|search|platform|audience|draft|link|image|setting|notification|upload|file|detail|because)\b/i.test(t),trans=/\b(first|next|later|after|before|because|however|also|finally|as a result|looking back)\b/i.test(t);return `<ul class="quality"><li class="${n>=target?'good':'warn'}">${n} words ${n>=target?'✓':'· keep developing'}</li><li class="${topic?'good':'warn'}">Topic sentence started ${topic?'✓':''}</li><li class="${evidence?'good':'warn'}">Specific evidence/details ${evidence?'✓':'needed'}</li><li class="${trans?'good':'warn'}">Transition/coherence cue ${trans?'✓':'needed'}</li></ul>`}
function exportText(kind='packet'){let essay=finalEssay();if(kind==='essay')return essay;return `Digital Literacy Narrative Builder Export

${essay}

${st.moments.map((m,i)=>`Moment ${i+1}
${momentText(i)}`).join('\n\n')}

${st.review.notes}`}function download(kind='essay'){flushPageTime();ensureAnalytics().downloads.push({at:new Date().toISOString(),kind});save();let text,type='text/plain;charset=utf-8',name='digital-literacy-narrative.txt';if(kind==='profdata'){let payload=studentExportPayload();text='DLN_PROFESSOR_DATA_V1_BASE64\n'+b64EncodeUnicode(JSON.stringify(payload));name='digital-literacy-professor-dashboard-data.dln.txt'}else if(kind==='backup'){text=JSON.stringify({format:'DLN_BACKUP_V5',exportedAt:new Date().toISOString(),state:st,draft:finalEssay()},null,2);type='application/json;charset=utf-8';name='digital-literacy-backup.json'}else if(kind==='packet'){text=exportText(kind);name='digital-literacy-full-packet.txt'}else{text=finalEssay();name='digital-literacy-narrative.txt'}let blob=new Blob([text],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);toast('File downloaded.')}function restoreBackup(){let inp=document.createElement('input');inp.type='file';inp.accept='.json,.txt,application/json,text/plain';inp.onchange=()=>{let f=inp.files&&inp.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(String(r.result||''));if(!data.state)throw new Error('Missing state');st=merge(fresh(),data.state);save();render();toast('Backup restored.')}catch(e){modal('Restore failed','The selected file was not a valid builder backup.',`<p class="placeholder">${esc(e.message||e)}</p>`)}};r.readAsText(f)};inp.click()}  
function profKeyFor(el,idx){if(el.dataset.profKey)return el.dataset.profKey;let parts=[],n=el;while(n&&n!==document.body&&parts.length<6){if(n.id){parts.unshift('#'+n.id);break}let bit=n.tagName?n.tagName.toLowerCase():'';if(n.dataset){if(n.dataset.a)bit+='[a='+n.dataset.a+']';if(n.dataset.group)bit+='[group='+n.dataset.group+']';if(n.dataset.i)bit+='[i='+n.dataset.i+']';if(n.dataset.id)bit+='[id='+n.dataset.id+']'}if(n.className&&typeof n.className==='string'){let cls=n.className.split(/\s+/).filter(Boolean).slice(0,2).join('.');if(cls)bit+='.'+cls}let sib=0,p=n.parentElement;if(p){[...p.children].forEach((c,i)=>{if(c===n)sib=i})}parts.unshift(bit+':'+sib);n=n.parentElement}return 'prof-'+String(st.screen)+'-'+parts.join('/')}function profNodes(){let roots=[document.querySelector('aside.side'),document.querySelector('main.main')].filter(Boolean),out=[],seen=new Set();roots.forEach(root=>{let nodes=[...root.querySelectorAll('h1,h2,h3,h4,p,label,button,li,span,strong,.profCheckboxText,.placeholder,.eyebrow,.status,.navTitle,.navMeta,.sideTitle,.saveNote,.stat span,.stat strong')];nodes.forEach((el,idx)=>{if(el.closest('textarea,select,input')||el.dataset.profKey)return;if(el.querySelector('textarea,select,input')&&!el.classList.contains('profCheckboxText'))return;let txt=String(el.textContent||'').trim();if(!txt)return;let hasEditableChild=el.querySelector('[data-prof-key],[data-prof-editable],.navTitle,.navMeta,.num,.chev');if(hasEditableChild&&!el.matches('button.btn,button.lessonBtn,.placeholder'))return;let id=profKeyFor(el,idx);if(seen.has(id))return;seen.add(id);out.push([el,id])})});return out}  
function profReady(){[...document.querySelectorAll('[data-prof-key]')].forEach(el=>{el.dataset.edit=el.dataset.profKey;if(PROF&&st.profEditMode){el.dataset.profEditable='true';el.title='Edit mode: click to edit this dynamic template. Keep bracket tokens like [word-count].'}else{el.removeAttribute('data-prof-editable');el.removeAttribute('title')}});(st.profEdits&&profNodes()).forEach(x=>{let el=x[0],id=x[1];el.dataset.edit=id;if(st.profEdits[id]!==undefined)el.textContent=st.profEdits[id]});if(!PROF)return;if(st.profEditMode){profNodes().forEach(x=>{let el=x[0],id=x[1];el.dataset.edit=id;el.dataset.profEditable='true';el.title='Edit mode: click to edit this text'});[...document.querySelectorAll('button[disabled]')].forEach(el=>{if(el.dataset.a!=='toggleProfEdit'){el.dataset.profDisabled='true';el.disabled=false;el.setAttribute('aria-disabled','true')}})}}  
function profEditTarget(e){if(!PROF||!st.profEditMode)return null;if(e.target.closest('textarea,select'))return null;if(e.target.matches('input[type=checkbox]')){e.preventDefault();return e.target.closest('label')?.querySelector('.profCheckboxText,[data-edit],[data-prof-key]')||null}if(e.target.closest('input'))return null;let t=e.target.closest('[data-prof-key],[data-edit],[data-a],button,h1,h2,h3,h4,p,label,li,span,strong,.profCheckboxText,.placeholder,.eyebrow,.navTitle,.navMeta,.sideTitle,.saveNote');if(!t)return null;if(t.closest('#modal'))return null;return t.dataset.edit||t.dataset.profKey||t.classList.contains('profCheckboxText')?t:null}function editText(el){let id=el.dataset.profKey||el.dataset.edit||profKeyFor(el,0),old=el.dataset.profKey?(st.profEdits?.[id]??el.dataset.profTemplate):((st.profEdits&&st.profEdits[id]!==undefined)?st.profEdits[id]:el.textContent),newText=prompt(el.dataset.profKey?'Edit this template. Keep bracket tokens such as [word-count] if the value should remain dynamic.':'Edit this text:',old);if(newText===null)return;if(!st.profEdits)st.profEdits={};if(!Array.isArray(st.profEditLog))st.profEditLog=[];st.profEdits[id]=newText;st.profEditLog.push({at:new Date().toISOString(),screen:String(st.screen),id,from:old,to:newText});save();render();toast('Text saved. Click Done when finished to download the edited app.')}  
function cleanSeedState(){let clean=fresh();clean.profEdits={...(st.profEdits||{})};clean.profEditLog=Array.isArray(st.profEditLog)?st.profEditLog.slice():[];clean.profHiddenPages={...(st.profHiddenPages||{})};clean.profEditMode=false;return clean}function editLogComment(seed){let lines=['Professor Edit Log','Generated: '+new Date().toISOString(),'Storage key: '+KEY,'Student progress intentionally omitted from seed; after first launch, student progress persists normally in this browser.',''];let log=Array.isArray(seed.profEditLog)?seed.profEditLog:[];if(!log.length)lines.push('No professor text edits recorded.');else log.forEach((e,i)=>{lines.push((i+1)+'. ['+(e.at||'unknown time')+'] screen '+(e.screen||'unknown')+' '+(e.id||'unknown id'));lines.push('   FROM: '+String(e.from??'').replace(/\s+/g,' ').trim());lines.push('   TO:   '+String(e.to??'').replace(/\s+/g,' ').trim())});return '<!--\n'+lines.join('\n').replace(/--/g,'- -')+'\n-->\n'}
function downloadEditedHtml(){save();let was=st.profEditMode,seedState=cleanSeedState();st.profEditMode=false;save();let doc=document.documentElement.cloneNode(true),app=doc.querySelector('#app');if(app)app.innerHTML='';doc.querySelector('body')?.classList.remove('prof-edit-active');doc.querySelectorAll('[data-prof-editable]').forEach(el=>{el.removeAttribute('data-prof-editable');el.removeAttribute('title')});doc.querySelectorAll('[data-prof-disabled]').forEach(el=>{el.removeAttribute('data-prof-disabled');el.removeAttribute('aria-disabled')});let md=doc.querySelector('#modal');if(md){md.classList.remove('show');let mb=md.querySelector('#mb');if(mb)mb.innerHTML=''}let to=doc.querySelector('#toast');if(to){to.classList.remove('show');to.textContent=''}let html='<!doctype html>\n'+doc.outerHTML;html=html.replace('<head>','<head>\n'+editLogComment(seedState));let state=JSON.stringify(seedState).replace(/</g,'\\u003c');let openTag='<scr'+'ipt>';let closeTag='<'+'/script>';let seed=openTag+'try{let k='+JSON.stringify(KEY)+',seed=JSON.parse('+JSON.stringify(state)+'),cur=JSON.parse(localStorage.getItem(k)||"{}");cur.profEdits=Object.assign({},cur.profEdits||{},seed.profEdits||{});cur.profEditLog=seed.profEditLog||cur.profEditLog||[];cur.profHiddenPages=Object.assign({},cur.profHiddenPages||{},seed.profHiddenPages||{});localStorage.setItem(k,JSON.stringify(Object.assign(seed,cur,{profEdits:cur.profEdits,profEditLog:cur.profEditLog,profHiddenPages:cur.profHiddenPages,profEditMode:false})));}catch(e){console.warn("Professor edit seed failed",e)}'+closeTag+'\n';html=html.replace('<scr'+'ipt>\n(()=>{',seed+'<scr'+'ipt>\n(()=>{');st.profEditMode=was&&PROF;save();let blob=new Blob([html],{type:'text/html;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='digital-literacy-narrative-builder-clearer-interactive-v13-professor-hide-pages.html';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('Clean inter function copy(t){if(!t.trim())return toast('Nothing to copy yet.');let fallback=()=>modal('Copy manually','Select and copy the text below.',`<textarea class="copyArea" readonly>${esc(t)}</textarea>`),p=navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(t):null;if(!p)return fallback();p.then(()=>toast('Essay copied.')).catch(fallback)}function modal(t,s,h){$('#mt').textContent=t;$('#ms').textContent=s;$('#mb').innerHTML=h;let m=$('#modal');m.classList.add('show');setTimeout(()=>m.querySelector('.modalCard')?.focus(),0)}function closeModal(){$('#modal').classList.remove('show')}$('#mc').onclick=closeModal;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});function toast(m){let t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),2200)}function clear(){if(prompt('Type CLEAR to delete saved work from this browser.')==='CLEAR'){localStorage.removeItem(KEY);st=fresh();render()}}
